version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: logitrack-db
    environment:
      MYSQL_DATABASE: logitrack
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  api:
    build: ..
    container_name: logitrack-api
    ports:
      - "8443:8443"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/logitrack
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: logitrack-pma
    ports:
      - "8000:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

volumes:
  db_data:
  mysql_data: